name: 'Deploy to Cloudflare Workers'
description: 'Build and deploy the application to Cloudflare Workers via Wrangler'

inputs:
  apiToken:
    description: 'Cloudflare API token'
    required: true
  accountId:
    description: 'Cloudflare account ID'
    required: true
  environment:
    description: 'Wrangler environment name to deploy to (dev or prod)'
    required: true
  resendApiKey:
    description: 'Resend API key for email sending'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      with:
        version: 10.33.0

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      shell: bash

    - name: Build domain package
      run: pnpm --filter @edu-quest/domain build
      shell: bash

    - name: Build app package
      run: pnpm --filter @edu-quest/app build
      shell: bash

    - name: Deploy to Cloudflare Workers
      uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
      with:
        apiToken: ${{ inputs.apiToken }}
        accountId: ${{ inputs.accountId }}
        workingDirectory: apps/edge
        command: deploy --config wrangler.${{ inputs.environment }}.toml
      env:
        RESEND_API_KEY: ${{ inputs.resendApiKey }}
