name: 'Apply D1 migrations'
description: 'Run pnpm install and apply Cloudflare D1 migrations via Wrangler'

inputs:
  apiToken:
    description: 'Cloudflare API token'
    required: true
  accountId:
    description: 'Cloudflare account ID'
    required: true
  environment:
    description: 'Wrangler environment name to apply migrations against'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6
      with:
        version: 10.33.0

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      shell: bash

    - name: Apply migrations
      uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
      with:
        apiToken: ${{ inputs.apiToken }}
        accountId: ${{ inputs.accountId }}
        workingDirectory: apps/edge
        command: d1 migrations apply DB --config wrangler.${{ inputs.environment }}.toml --remote
