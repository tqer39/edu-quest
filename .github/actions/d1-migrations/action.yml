name: 'Apply D1 migrations'
description: 'Run pnpm install and apply Cloudflare D1 migrations via Wrangler'

inputs:
  apiToken:
    description: 'Cloudflare API token'
    required: true
  accountId:
    description: 'Cloudflare account ID'
    required: true
  environment:
    description: 'Wrangler environment name to apply migrations against'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      with:
        version: 10.33.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
      shell: bash

    - name: Apply migrations
      uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
      with:
        apiToken: ${{ inputs.apiToken }}
        accountId: ${{ inputs.accountId }}
        workingDirectory: apps/edge
        command: d1 migrations apply DB --config wrangler.${{ inputs.environment }}.toml --remote
